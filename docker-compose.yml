version: '3.8'

services:
  # FastAPI 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparklaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_MODE=${LLM_MODE:-local}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - APP_NAME=SparkLaw
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - sparklaw-network

  # Next.js 前端服务（可选）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sparklaw-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sparklaw-network

networks:
  sparklaw-network:
    driver: bridge

volumes:
  data:
  logs:
